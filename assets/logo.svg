<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- Rounded square clip -->
  <defs>
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Everything clipped to rounded square -->
  <g clip-path="url(#roundedSquare)">

    <!-- ===== CORGI BODY INSIDE BOTTLE ===== -->

    <!-- Tail -->
    <path d="M330,450 Q395,405 365,345" stroke="#C97020" stroke-width="34" fill="none" stroke-linecap="round"/>

    <!-- Torso orange -->
    <ellipse cx="256" cy="390" rx="98" ry="108" fill="#C97020"/>
    <!-- White belly -->
    <ellipse cx="256" cy="418" rx="64" ry="74" fill="#F5EFE0"/>

    <!-- Back legs -->
    <ellipse cx="190" cy="468" rx="38" ry="26" fill="#C97020"/>
    <ellipse cx="322" cy="468" rx="38" ry="26" fill="#C97020"/>
    <!-- White paws -->
    <ellipse cx="190" cy="490" rx="32" ry="18" fill="#F5EFE0"/>
    <ellipse cx="322" cy="490" rx="32" ry="18" fill="#F5EFE0"/>

    <!-- Front legs -->
    <rect x="178" y="295" width="46" height="82" rx="23" fill="#C97020"/>
    <rect x="288" y="295" width="46" height="82" rx="23" fill="#C97020"/>
    <!-- White front paws -->
    <ellipse cx="201" cy="374" rx="32" ry="18" fill="#F5EFE0"/>
    <ellipse cx="311" cy="374" rx="32" ry="18" fill="#F5EFE0"/>

    <!-- ===== BOTTLE — wide body, tapers to narrow mouth ===== -->
    <path d="
      M 118,318
      L 118,458
      Q 118,510 256,510
      Q 394,510 394,458
      L 394,318
      Q 394,292 368,280
      L 318,262
      Q 298,256 298,244
      L 298,228
      Q 298,216 284,214
      L 228,214
      Q 214,216 214,228
      L 214,244
      Q 214,256 194,262
      L 144,280
      Q 118,292 118,318
      Z
    " fill="rgba(220,170,60,0.11)" stroke="#C07818" stroke-width="6.5" stroke-linejoin="round"/>

    <!-- Bottle rim ellipse (narrow opening) -->
    <ellipse cx="256" cy="214" rx="56" ry="16"
          fill="rgba(220,170,60,0.11)" stroke="#C07818" stroke-width="6"/>

    <!-- Glass sheen left -->
    <rect x="140" y="330" width="26" height="160" rx="13" fill="white" opacity="0.18"/>
    <!-- Glass sheen right -->
    <rect x="352" y="330" width="14" height="160" rx="7" fill="white" opacity="0.09"/>

    <!-- ===== DOG NECK ===== -->
    <rect x="224" y="196" width="64" height="88" rx="32" fill="#C97020"/>
    <!-- White throat -->
    <ellipse cx="256" cy="246" rx="20" ry="36" fill="#F5EFE0"/>

    <!-- ===== HEAD ===== -->

    <!-- EARS — wide corgi ears, broad base -->
    <!-- Left ear outer -->
    <polygon points="112,164 158,20 264,138" fill="#C97020"/>
    <!-- Left ear inner -->
    <polygon points="126,158 168,36 258,138" fill="#E8BF90" opacity="0.75"/>
    <!-- Right ear outer -->
    <polygon points="400,164 354,20 248,138" fill="#C97020"/>
    <!-- Right ear inner -->
    <polygon points="386,158 344,36 254,138" fill="#E8BF90" opacity="0.75"/>

    <!-- Head base -->
    <ellipse cx="256" cy="148" rx="118" ry="108" fill="#C97020"/>

    <!-- White muzzle -->
    <ellipse cx="256" cy="182" rx="74" ry="56" fill="#F5EFE0"/>

    <!-- ===== CLEAN ABSTRACT FACE ===== -->

    <!-- Eyes — simple solid, single catchlight -->
    <circle cx="214" cy="138" r="20" fill="#1A0A02"/>
    <circle cx="298" cy="138" r="20" fill="#1A0A02"/>
    <circle cx="222" cy="130" r="8" fill="white"/>
    <circle cx="306" cy="130" r="8" fill="white"/>

    <!-- Nose -->
    <ellipse cx="256" cy="178" rx="18" ry="13" fill="#1A0A02"/>

    <!-- Smile -->
    <path d="M224,196 Q256,222 288,196" stroke="#1A0A02" stroke-width="7" fill="none" stroke-linecap="round"/>

    <!-- Tongue — long continuous strip -->
    <rect x="238" y="210" width="36" height="62" rx="18" fill="#E03535"/>
    <!-- Groove -->
    <line x1="256" y1="214" x2="256" y2="268" stroke="#C02020" stroke-width="4" stroke-linecap="round"/>

  </g>

  <!-- Rounded square border stroke (outside clip, decorative) -->
  <rect x="4" y="4" width="504" height="504" rx="112" ry="112"
        fill="none" stroke="rgba(192,120,24,0.18)" stroke-width="8"/>

</svg>
